# PRODUCTION ENVIRONMENT  
server.port=8082

# Logging - Minimal cho production
logging.level.com.example.demo=WARN
logging.level.org.springframework.web=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %msg%n

# App Config
app.environment=production
app.features.debug-mode=false
app.features.email-enabled=true
app.features.sms-enabled=true

# External API URLs
app.external.payment-api=https://payment-api.example.com
app.external.notification-api=https://notification-api.example.com

# Security
server.error.include-stacktrace=never
server.error.include-message=never

# No database - chỉ focus profiles