# DEVELOPMENT ENVIRONMENT
server.port=8080

# Logging - Verbose cho development
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# App Config
app.environment=development
app.features.debug-mode=true
app.features.email-enabled=true
app.features.sms-enabled=false

# External API URLs (giả lập)
app.external.payment-api=https://dev-payment-api.example.com
app.external.notification-api=https://dev-notification-api.example.com

# No database - chỉ focus profiles