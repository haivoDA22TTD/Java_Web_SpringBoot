# STAGING ENVIRONMENT
server.port=8081

# Logging - Moderate cho staging
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# App Config
app.environment=staging
app.features.debug-mode=false
app.features.email-enabled=true
app.features.sms-enabled=true

# External API URLs
app.external.payment-api=https://staging-payment-api.example.com
app.external.notification-api=https://staging-notification-api.example.com

# No database - chỉ focus profiles