# LESSON 8: Application Configuration - Redis Caching
# Spring Boot application configuration với MongoDB, JWT và Redis

# ===== APPLICATION SETTINGS =====
spring.application.name=Student Management System
server.port=8080

# ===== MONGODB CONFIGURATION (LESSON 5) =====
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=student_management

# MongoDB connection settings
spring.data.mongodb.auto-index-creation=true

# ===== REDIS CONFIGURATION (LESSON 8) =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Redis connection pool settings
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.jedis.pool.max-wait=-1ms

# ===== CACHE CONFIGURATION (LESSON 8) =====
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ===== JWT CONFIGURATION (LESSON 7) =====
app.jwt.secret=mySecretKey
app.jwt.expiration=86400

# ===== LOGGING CONFIGURATION =====
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG

# ===== JACKSON CONFIGURATION =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===== ERROR HANDLING =====
server.error.include-message=always
server.error.include-binding-errors=always