version: '3.8'

services:
  # Redis Server
  redis:
    image: redis:7-alpine
    container_name: student_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - student_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Insight - Web GUI
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: student_redis_insight
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - redis
    networks:
      - student_network
    environment:
      - REDIS_HOSTS=local:redis:6379

  # MongoDB (existing)
  mongodb:
    image: mongo:7
    container_name: student_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - student_network
    environment:
      MONGO_INITDB_DATABASE: student_management

volumes:
  redis_data:
    driver: local
  mongodb_data:
    driver: local

networks:
  student_network:
    driver: bridge