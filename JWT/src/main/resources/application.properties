# LESSON 7: Student Management System - MongoDB + Security
server.port=8080
spring.application.name=Student Management System

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/student_management
spring.data.mongodb.auto-index-creation=true

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# JWT Configuration
app.jwt.secret=myVerySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm
app.jwt.expiration=86400

# MongoDB Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG

