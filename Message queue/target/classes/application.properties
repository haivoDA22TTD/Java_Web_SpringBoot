# LESSON 9: Application Configuration - MongoDB + JWT + Redis + RabbitMQ
# Spring Boot application configuration với MongoDB, JWT, Redis và RabbitMQ

# ===== APPLICATION SETTINGS =====
spring.application.name=Student Management System
server.port=8080

# ===== MONGODB CONFIGURATION (LESSON 5) =====
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=student_management

# MongoDB connection settings
spring.data.mongodb.auto-index-creation=true

# ===== REDIS CONFIGURATION (LESSON 8) =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Redis connection pool settings
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.jedis.pool.max-wait=-1ms

# ===== CACHE CONFIGURATION (LESSON 8) =====
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ===== RABBITMQ CONFIGURATION (LESSON 9) =====
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=60000
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ===== EMAIL CONFIGURATION (LESSON 9) =====
spring.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# App email settings
app.email.from=noreply@studentmanagement.com

# ===== JWT CONFIGURATION (LESSON 7) =====
app.jwt.secret=myVerySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm
app.jwt.expiration=86400

# ===== LOGGING CONFIGURATION =====
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.amqp=DEBUG

# ===== JACKSON CONFIGURATION =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===== ERROR HANDLING =====
server.error.include-message=always
server.error.include-binding-errors=always

